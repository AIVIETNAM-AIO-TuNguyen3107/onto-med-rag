paths:
  input_dir: input
  runs_dir: runs
  artifacts_dir: artifacts
  icd_source: "DM ICD10-19_8_BYT.xlsx"
  icd_catalog: artifacts/icd10_tt06_vi.jsonl
  icd_catalog_csv: artifacts/icd10_tt06_vi.csv
  icd_catalog_manifest: artifacts/icd10_tt06_vi.manifest.json
  icd_index: artifacts/icd_index.json
  rxnorm_cache: artifacts/rxnorm_cache.json

icd_crawl:
  api_base_url: https://ccs.whiteneuron.com/api/ICD10_TT06
  source_page_url: https://icd.kcb.vn/icd-10-tt06/icd10-tt06
  language: vi
  request_delay_seconds: 0.5
  connect_timeout_seconds: 10
  read_timeout_seconds: 30
  max_retries: 5

entity_finding:
  chunk_chars: 1800
  chunk_overlap_chars: 160
  ner_threshold: 0.35

ner:
  backend: noop
  model_id: Ihor/gliner-biomed-large-v1.0
  local_files_only: false

llm:
  backend: noop
  model_id: Qwen/Qwen3.5-9B
  reasoning_effort: high
  thinking: true
  max_new_tokens: 4096
  max_retries: 2

linking:
  icd_max_candidates: 3
  rxnorm_max_candidates: 3
  use_rxnav_api: true

run:
  fail_on_model_unavailable: false
  pretty_json: true
