paths:
  input_dir: input
  runs_dir: runs
  artifacts_dir: artifacts
  icd_source: "DM ICD10-19_8_BYT.xlsx"
  icd_catalog: artifacts/icd10_tt06_vi.jsonl
  icd_catalog_csv: artifacts/icd10_tt06_vi.csv
  icd_catalog_manifest: artifacts/icd10_tt06_vi.manifest.json
  icd_index: artifacts/icd_index.json
  rxnorm_cache: artifacts/rxnorm_online_first5_cache.json

entity_finding:
  chunk_chars: 1400
  chunk_overlap_chars: 160
  ner_threshold: 0.35

ner:
  backend: gliner
  model_id: Ihor/gliner-biomed-large-v1.0
  local_files_only: true

llm:
  backend: openai_compatible
  model_id: Qwen/Qwen3.5-9B:fastest
  endpoint: https://router.huggingface.co/v1
  api_key_env: HF_TOKEN
  reasoning_effort: high
  thinking: true
  max_new_tokens: 4096
  max_retries: 2
  request_timeout_seconds: 600

linking:
  icd_max_candidates: 3
  rxnorm_max_candidates: 3
  retrieval_candidates: 20
  use_rxnav_api: true

run:
  fail_on_model_unavailable: true
  pretty_json: true
  llm_full_review: true
